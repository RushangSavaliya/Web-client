<!-- register.html -->

<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register | Messaging Platform</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <h1>🟢 Create Account</h1>
            <form id="registerForm" novalidate>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Username"
                    required
                    minlength="3"
                    maxlength="20"
                    pattern="^[a-z0-9._]+$"
                />
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Email"
                    required
                />
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Password"
                    required
                    minlength="10"
                />
                <button type="submit">Register</button>
            </form>
            <p id="message" role="alert"></p>
        </div>
        <script src="script.js"></script>
    </body>
</html>
